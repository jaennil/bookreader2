apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookreader
  labels:
    app: bookreader
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookreader
  template:
    metadata:
      labels:
        app: bookreader
    spec:
      nodeSelector:
        kubernetes.io/hostname: jaennil-pc
      securityContext:
        fsGroup: 10001
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: init-data
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/books && chown -R 10001:10001 /data"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: bookreader
          image: app
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
          env:
            - name: DATA_DIR
              value: /data
            - name: WEB_DIR
              value: /app/dist
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bookreader-data
